name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
        working-directory: dashboard

      - run: npm run build
        working-directory: dashboard
        env:
          # Safe to be plain build-time values, not GitHub secrets: this is
          # the Supabase anon key, meant to ship in a public static bundle -
          # RLS policies are the actual access boundary. See docs/architecture.md.
          VITE_SUPABASE_URL: https://fkmugsusoewykyazmwwa.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrbXVnc3Vzb2V3eWt5YXptd3dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MzU0MDMsImV4cCI6MjA5OTQxMTQwM30.Z6Kt31XvT_LzFJcncupfANXdI4hgqmHSIzmRsOCs1PA

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
