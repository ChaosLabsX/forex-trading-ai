# Which concrete plugin backs each subsystem. Not a secret - safe to commit.
# Entries left null/empty aren't implemented yet; see PLAN.md for phase order.
# Moves to the dashboard Settings UI once it exists (Phase 4).

broker: mt5             # implemented; connect() needs the MT5 terminal installed + logged in
market_data: mt5        # implemented; same requirement
strategies:
  - ema_trend_v1          # reference implementation - see PLAN.md
risk_engine: default
execution_engine: default
news_provider: forexfactory  # free ForexFactory weekly economic calendar (no
                             # key). Fails open if the feed is unreachable.
                             # 'placeholder' reverts to no blackout.
notifications:
  - console              # always safe - no external dependency
  - telegram              # verified working 2026-07-12
ai_provider: claude     # shadow mode only - see engine/loop.py, does not gate execution yet
